services:
  # Traefik reverse proxy
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=maks.kotov38@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.myresolver.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8082:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    restart: always
    networks:
      - app-network

  # Databases
  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  postgres-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    volumes:
      - user_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  postgres-forum:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forum_db
    volumes:
      - forum_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  postgres-shop:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shop_db
    volumes:
      - shop_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  postgres-landing:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: landing_db
    volumes:
      - landing_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Services
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 8001
      JWT_SECRET: your-secret-key-change-in-production
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth_db
      DB_SSLMODE: disable
    depends_on:
      postgres-auth:
        condition: service_healthy
    expose:
      - "8001"
    networks:
      - app-network
    restart: always

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      PORT: 8002
      JWT_SECRET: your-secret-key-change-in-production
      DB_HOST: postgres-user
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: user_db
      DB_SSLMODE: disable
    depends_on:
      postgres-user:
        condition: service_healthy
    expose:
      - "8002"
    networks:
      - app-network
    restart: always

  forum-service:
    build:
      context: .
      dockerfile: services/forum-service/Dockerfile
    environment:
      PORT: 8003
      DB_HOST: postgres-forum
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: forum_db
      DB_SSLMODE: disable
    depends_on:
      postgres-forum:
        condition: service_healthy
    expose:
      - "8003"
    networks:
      - app-network
    restart: always

  sticker-service:
    build:
      context: .
      dockerfile: services/sticker-service/Dockerfile
    environment:
      PORT: 8004
      DB_HOST: postgres-shop
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: shop_db
      DB_SSLMODE: disable
    depends_on:
      postgres-shop:
        condition: service_healthy
    expose:
      - "8004"
    networks:
      - app-network
    restart: always

  localization-service:
    build:
      context: .
      dockerfile: services/localization-service/Dockerfile
    environment:
      PORT: 8005
    expose:
      - "8005"
    networks:
      - app-network
    restart: always

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      PORT: 8006
      JWT_SECRET: your-secret-key-change-in-production
    expose:
      - "8006"
    networks:
      - app-network
    restart: always

  landing-service:
    build:
      context: .
      dockerfile: services/landing-service/Dockerfile
    environment:
      PORT: 8007
      DB_HOST: postgres-landing
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: landing_db
      DB_SSLMODE: disable
    depends_on:
      postgres-landing:
        condition: service_healthy
    expose:
      - "8007"
    networks:
      - app-network
    restart: always

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      PORT: 8080
      JWT_SECRET: your-secret-key-change-in-production
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      FORUM_SERVICE_URL: http://forum-service:8003
      STICKER_SERVICE_URL: http://sticker-service:8004
      LOCALIZATION_SERVICE_URL: http://localization-service:8005
      NOTIFICATION_SERVICE_URL: http://notification-service:8006
      LANDING_SERVICE_URL: http://landing-service:8007
    depends_on:
      - auth-service
      - user-service
      - forum-service
      - sticker-service
      - localization-service
      - notification-service
      - landing-service
    ports:
      - "8080:8080"
    expose:
      - "8080"
    networks:
      - app-network
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`api.phantom-messenger.ru`)"
      - "traefik.http.routers.api-gateway.entrypoints=websecure"
      - "traefik.http.routers.api-gateway.tls.certresolver=myresolver"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8080"
      - "traefik.http.routers.api-gateway-http.rule=Host(`api.phantom-messenger.ru`)"
      - "traefik.http.routers.api-gateway-http.entrypoints=web"
      - "traefik.http.routers.api-gateway-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # API under same host (phantom-messenger.ru/api/...) so frontend works without separate API domain
      - "traefik.http.routers.api-gateway-samehost.rule=Host(`phantom-messenger.ru`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-gateway-samehost.entrypoints=websecure"
      - "traefik.http.routers.api-gateway-samehost.tls.certresolver=myresolver"
      - "traefik.http.routers.api-gateway-samehost.priority=100"
      - "traefik.http.routers.api-gateway-samehost.service=api-gateway"
      - "traefik.http.routers.api-gateway-samehost-http.rule=Host(`phantom-messenger.ru`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-gateway-samehost-http.entrypoints=web"
      - "traefik.http.routers.api-gateway-samehost-http.priority=100"
      - "traefik.http.routers.api-gateway-samehost-http.middlewares=redirect-to-https"
      - "traefik.http.routers.api-gateway-samehost-http.service=api-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # For server-side fallback inside docker network
      NEXT_PUBLIC_API_BASE: http://api-gateway:8080/api/v1
    depends_on:
      - api-gateway
    ports:
      - "3005:3000"
    expose:
      - "3000"
    networks:
      - app-network
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`phantom-messenger.ru`) || Host(`www.phantom-messenger.ru`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend-http.rule=Host(`phantom-messenger.ru`) || Host(`www.phantom-messenger.ru`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https"

networks:
  app-network:
    driver: bridge

volumes:
  auth_db_data:
  user_db_data:
  forum_db_data:
  shop_db_data:
  landing_db_data:
  letsencrypt: